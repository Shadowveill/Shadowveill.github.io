<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CET-6</title>
    <!-- 国内CDN -->
    <script src="https://cdn.bootcdn.net/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <!-- Google Fonts 替代 -->
    <link href="https://fonts.googleapis.cnpmjs.org/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-card-hover: #22222e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.08);
            --card-radius: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景动画 */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99, 102, 241, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 100% 100%, rgba(139, 92, 246, 0.1), transparent),
                radial-gradient(ellipse 40% 30% at 0% 80%, rgba(59, 130, 246, 0.1), transparent);
            pointer-events: none;
            z-index: 0;
        }

        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Bento Grid Layout */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-auto-rows: minmax(80px, auto);
            gap: 16px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--card-radius);
            padding: 24px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        .card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* Hero Card */
        .hero-card {
            grid-column: span 8;
            grid-row: span 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(99, 102, 241, 0.1) 100%);
        }

        .greeting {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .greeting-emoji {
            font-size: 24px;
            animation: wave 2s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(20deg); }
            75% { transform: rotate(-10deg); }
        }

        .hero-title {
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 16px;
        }

        .hero-title .highlight {
            background: linear-gradient(135deg, var(--accent) 0%, #a855f7 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 400px;
        }

        /* Score Card */
        .score-card {
            grid-column: span 4;
            grid-row: span 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(180deg, var(--bg-card) 0%, rgba(16, 185, 129, 0.05) 100%);
        }

        .score-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .score-value {
            font-size: 72px;
            font-weight: 800;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .score-value.pass {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-value.fail {
            background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-max {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .score-status {
            margin-top: 16px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .score-status.pass {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .score-status.fail {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Section Cards */
        .section-card {
            grid-column: span 6;
            grid-row: span 4;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .section-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .section-icon.listening {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(139, 92, 246, 0.2) 100%);
        }

        .section-icon.reading {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.2) 0%, rgba(244, 114, 182, 0.2) 100%);
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
        }

        .section-score {
            margin-left: auto;
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-light);
            font-variant-numeric: tabular-nums;
        }

        /* Input Group */
        .input-group {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
            transition: var(--transition);
        }

        .input-group:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .input-title {
            font-size: 14px;
            font-weight: 600;
        }

        .input-subtitle {
            font-size: 12px;
            color: var(--text-muted);
        }

        .input-score {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent-light);
            font-variant-numeric: tabular-nums;
        }

        .input-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-btn:hover {
            background: var(--accent);
            transform: scale(1.05);
        }

        .input-btn:active {
            transform: scale(0.95);
        }

        .input-field {
            flex: 1;
            height: 36px;
            border: none;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            font-family: inherit;
            font-variant-numeric: tabular-nums;
        }

        .input-field:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--accent);
        }

        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .progress-fill.good {
            background: linear-gradient(90deg, var(--success), #34d399);
        }

        .progress-fill.bad {
            background: linear-gradient(90deg, var(--danger), #f87171);
        }

        /* Subjective Card */
        .subjective-card {
            grid-column: span 8;
            grid-row: span 2;
        }

        .slider-container {
            margin-top: 16px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .slider-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-light);
        }

        .slider-hint {
            font-size: 12px;
            color: var(--text-muted);
        }

        .slider {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            cursor: pointer;
            box-shadow: 0 0 20px var(--accent-glow);
            transition: var(--transition);
        }

        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        /* Stats Card */
        .stats-card {
            grid-column: span 4;
            grid-row: span 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .stat-item {
            text-align: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
            font-variant-numeric: tabular-nums;
        }

        .stat-value.listening {
            color: #818cf8;
        }

        .stat-value.reading {
            color: #f472b6;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Action Button */
        .reset-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 10px 40px var(--accent-glow);
            transition: var(--transition);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-btn:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 20px 60px var(--accent-glow);
        }

        /* Time Widget */
        .time-card {
            grid-column: span 4;
            grid-row: span 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .time-display {
            font-size: 48px;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
        }

        .date-display {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* Footer */
        .footer-card {
            grid-column: span 12;
            grid-row: span 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .footer-card a {
            color: var(--accent-light);
            text-decoration: none;
            transition: var(--transition);
        }

        .footer-card a:hover {
            color: var(--accent);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .bento-grid {
                grid-template-columns: repeat(6, 1fr);
            }
            
            .hero-card,
            .score-card,
            .section-card,
            .subjective-card,
            .stats-card,
            .time-card,
            .footer-card {
                grid-column: span 6;
            }

            .section-card {
                grid-row: span 5;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px 12px;
            }

            .bento-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .hero-card,
            .score-card,
            .section-card,
            .subjective-card,
            .stats-card,
            .time-card,
            .footer-card {
                grid-column: span 1;
            }

            .hero-card {
                grid-row: span 2;
            }

            .score-card {
                grid-row: span 2;
            }

            .section-card {
                grid-row: span 4;
            }

            .score-value {
                font-size: 56px;
            }

            .reset-btn {
                bottom: 20px;
                right: 20px;
            }
        }

        /* Remove number input arrows */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            animation: fadeInUp 0.6s ease backwards;
        }

        .card:nth-child(1) { animation-delay: 0.05s; }
        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.15s; }
        .card:nth-child(4) { animation-delay: 0.2s; }
        .card:nth-child(5) { animation-delay: 0.25s; }
        .card:nth-child(6) { animation-delay: 0.3s; }
        .card:nth-child(7) { animation-delay: 0.35s; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="noise-overlay"></div>
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const InputGroup = ({ title, subtitle, max, value, onChange, pointPerQ }) => {
            const correct = max - value;
            const score = correct * pointPerQ;
            const percentage = (score / (max * pointPerQ)) * 100;
            
            return (
                <div className="input-group">
                    <div className="input-header">
                        <div>
                            <div className="input-title">{title}</div>
                            <div className="input-subtitle">{subtitle} · 错{value}题</div>
                        </div>
                        <div className="input-score">{score.toFixed(1)}分</div>
                    </div>
                    <div className="input-controls">
                        <button 
                            className="input-btn"
                            onClick={() => onChange(Math.max(0, value - 1))}
                        >−</button>
                        <input 
                            type="number"
                            className="input-field"
                            min="0"
                            max={max}
                            value={value}
                            onChange={(e) => {
                                const val = parseInt(e.target.value) || 0;
                                if (val >= 0 && val <= max) onChange(val);
                            }}
                        />
                        <button 
                            className="input-btn"
                            onClick={() => onChange(Math.min(max, value + 1))}
                        >+</button>
                    </div>
                    <div className="progress-bar">
                        <div 
                            className={`progress-fill ${percentage >= 60 ? 'good' : 'bad'}`}
                            style={{ width: `${percentage}%` }}
                        />
                    </div>
                </div>
            );
        };

        const App = () => {
            const [wrongs, setWrongs] = useState({
                listen12: 4,
                listen3: 5,
                read1: 4,
                read2: 0,
                read3: 2
            });

            const [subjectiveScore, setSubjectiveScore] = useState(140);
            const [time, setTime] = useState(new Date());
            const [greeting, setGreeting] = useState('');

            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                const hour = new Date().getHours();
                if (hour >= 5 && hour < 12) setGreeting('早上好');
                else if (hour >= 12 && hour < 14) setGreeting('中午好');
                else if (hour >= 14 && hour < 18) setGreeting('下午好');
                else if (hour >= 18 && hour < 22) setGreeting('晚上好');
                else setGreeting('夜深了');
            }, []);

            const SCORES = {
                listen12: { max: 15, points: 7.1 },
                listen3: { max: 10, points: 14.2 },
                read1: { max: 10, points: 3.55 },
                read2: { max: 10, points: 7.1 },
                read3: { max: 10, points: 14.2 },
            };

            const calculatePart = (key) => {
                const correct = SCORES[key].max - wrongs[key];
                return correct * SCORES[key].points;
            };

            const listenScore = calculatePart('listen12') + calculatePart('listen3');
            const readScore = calculatePart('read1') + calculatePart('read2') + calculatePart('read3');
            const objectiveTotal = listenScore + readScore;
            const finalTotal = objectiveTotal + subjectiveScore;
            
            const isPass = finalTotal >= 425;
            const isExcellent = finalTotal >= 520;

            const handleReset = () => {
                setWrongs({
                    listen12: 0,
                    listen3: 0,
                    read1: 0,
                    read2: 0,
                    read3: 0
                });
                setSubjectiveScore(140);
            };

            const formatTime = (date) => {
                return date.toLocaleTimeString('zh-CN', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    hour12: false 
                });
            };

            const formatDate = (date) => {
                const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                return `${date.getMonth() + 1}月${date.getDate()}日 ${days[date.getDay()]}`;
            };

            return (
                <div className="container">
                    <div className="bento-grid">
                        {/* Hero Card */}
                        <div className="card hero-card">
                            <div className="greeting">
                                <span className="greeting-emoji">👋</span>
                                {greeting}，同学
                            </div>
                            <h1 className="hero-title">
                                CET-6 <span className="highlight">智能估分</span>
                            </h1>
                            <p className="hero-subtitle">
                                输入你的错题数，实时预测六级成绩。祝你取得理想的分数！
                            </p>
                        </div>

                        {/* Score Card */}
                        <div className="card score-card">
                            <div className="score-label">预测总分</div>
                            <div className={`score-value ${isPass ? 'pass' : 'fail'}`}>
                                {Math.round(finalTotal)}
                            </div>
                            <div className="score-max">满分 710</div>
                            <div className={`score-status ${isPass ? 'pass' : 'fail'}`}>
                                {isExcellent ? '🎉 优秀通过' : (isPass ? '✅ 顺利过级' : '⚠️ 继续努力')}
                            </div>
                        </div>

                        {/* Listening Section */}
                        <div className="card section-card">
                            <div className="section-header">
                                <div className="section-icon listening">🎧</div>
                                <div className="section-title">听力理解</div>
                                <div className="section-score">{listenScore.toFixed(1)}</div>
                            </div>
                            <InputGroup 
                                title="长对话 & 篇章"
                                subtitle="共15题 · 每题7.1分"
                                max={SCORES.listen12.max}
                                pointPerQ={SCORES.listen12.points}
                                value={wrongs.listen12}
                                onChange={(val) => setWrongs({...wrongs, listen12: val})}
                            />
                            <InputGroup 
                                title="讲座/讲话"
                                subtitle="共10题 · 每题14.2分"
                                max={SCORES.listen3.max}
                                pointPerQ={SCORES.listen3.points}
                                value={wrongs.listen3}
                                onChange={(val) => setWrongs({...wrongs, listen3: val})}
                            />
                        </div>

                        {/* Reading Section */}
                        <div className="card section-card">
                            <div className="section-header">
                                <div className="section-icon reading">📖</div>
                                <div className="section-title">阅读理解</div>
                                <div className="section-score">{readScore.toFixed(1)}</div>
                            </div>
                            <InputGroup 
                                title="选词填空"
                                subtitle="共10题 · 每题3.55分"
                                max={SCORES.read1.max}
                                pointPerQ={SCORES.read1.points}
                                value={wrongs.read1}
                                onChange={(val) => setWrongs({...wrongs, read1: val})}
                            />
                            <InputGroup 
                                title="长篇匹配"
                                subtitle="共10题 · 每题7.1分"
                                max={SCORES.read2.max}
                                pointPerQ={SCORES.read2.points}
                                value={wrongs.read2}
                                onChange={(val) => setWrongs({...wrongs, read2: val})}
                            />
                            <InputGroup 
                                title="仔细阅读"
                                subtitle="共10题 · 每题14.2分"
                                max={SCORES.read3.max}
                                pointPerQ={SCORES.read3.points}
                                value={wrongs.read3}
                                onChange={(val) => setWrongs({...wrongs, read3: val})}
                            />
                        </div>

                        {/* Subjective Score */}
                        <div className="card subjective-card">
                            <div className="section-header">
                                <div className="section-icon" style={{background: 'linear-gradient(135deg, rgba(251, 191, 36, 0.2) 0%, rgba(245, 158, 11, 0.2) 100%)'}}>✍️</div>
                                <div className="section-title">写作 & 翻译 (主观题估分)</div>
                            </div>
                            <div className="slider-container">
                                <div className="slider-header">
                                    <div className="slider-value">{subjectiveScore}分</div>
                                    <div className="slider-hint">一般范围：130 - 160 分</div>
                                </div>
                                <input 
                                    type="range"
                                    className="slider"
                                    min="0"
                                    max="213"
                                    value={subjectiveScore}
                                    onChange={(e) => setSubjectiveScore(parseInt(e.target.value))}
                                />
                            </div>
                        </div>

                        {/* Stats Card */}
                        <div className="card stats-card">
                            <div className="stats-grid">
                                <div className="stat-item">
                                    <div className="stat-value listening">{listenScore.toFixed(0)}</div>
                                    <div className="stat-label">听力得分</div>
                                </div>
                                <div className="stat-item">
                                    <div className="stat-value reading">{readScore.toFixed(0)}</div>
                                    <div className="stat-label">阅读得分</div>
                                </div>
                                <div className="stat-item">
                                    <div className="stat-value" style={{color: '#fbbf24'}}>{subjectiveScore}</div>
                                    <div className="stat-label">写译得分</div>
                                </div>
                                <div className="stat-item">
                                    <div className="stat-value" style={{color: '#34d399'}}>{objectiveTotal.toFixed(0)}</div>
                                    <div className="stat-label">客观总分</div>
                                </div>
                            </div>
                        </div>

                        {/* Time Card */}
                        <div className="card time-card">
                            <div className="time-display">{formatTime(time)}</div>
                            <div className="date-display">{formatDate(time)}</div>
                        </div>

                        {/* Footer */}
                        <div className="card footer-card">
                            <span>Made with ❤️ for CET-6</span>
                            <span>·</span>
                            <span>祝考试顺利 🎓</span>
                        </div>
                    </div>

                    {/* Reset Button */}
                    <button className="reset-btn" onClick={handleReset} title="重置所有数据">
                        ↻
                    </button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
